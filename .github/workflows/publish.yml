name: Publish

# Publishes @qodeca/8cli to npm via Trusted Publishing (OIDC) when a GitHub
# Release is published. No npm token is stored: npm verifies the trusted
# publisher configured for this repo + workflow, and provenance is automatic.
#
# One-time prerequisite: the package must exist on npm, and a trusted publisher
# must be configured at https://www.npmjs.com/package/@qodeca/8cli/access
# (GitHub org "qodeca", repository "8cli", workflow "publish.yml").

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
