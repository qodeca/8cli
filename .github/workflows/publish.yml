name: Publish

# Publishes @qodeca/8cli to npm via Trusted Publishing (OIDC) when a GitHub
# Release is published. No npm token is stored: npm verifies the trusted
# publisher configured for this repo + workflow, and provenance is automatic.
#
# One-time prerequisite: the package must exist on npm, and a trusted publisher
# must be configured at https://www.npmjs.com/package/@qodeca/8cli/access
# (GitHub org "qodeca", repository "8cli", workflow "publish.yml").

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate the OIDC publish behind a protected environment: configure `release`
    # in repo settings with a required reviewer + a `v*` tag deployment filter
    # so the npm token is only minted after approval.
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@11 # trusted publishing needs npm >= 11.5.1 (pinned major, not @latest)
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
