name: Publish

# Publishes @qodeca/8cli to npm with SLSA build provenance when a GitHub Release
# is published. Requires an NPM_TOKEN secret with publish rights to the @qodeca scope.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
