version = 1
SPDX-PackageName = "8cli"
SPDX-PackageSupplier = "Qodeca sp. z o.o."
SPDX-PackageDownloadLocation = "https://github.com/qodeca/8cli"

# REUSE specification (https://reuse.software/spec-3.3/) coverage for files that
# cannot carry an inline SPDX header (markdown with line-1 frontmatter, JSON,
# lockfiles, dotfiles). Source files under bin/ and src/ carry inline
# `SPDX-License-Identifier` headers instead. The `**` catch-all keeps any new
# file covered by default; per-asset overrides are added as more specific
# [[annotations]] blocks, or via `.license` sidecar files, with
# precedence = "closest".

[[annotations]]
path = "**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Qodeca sp. z o.o."
SPDX-License-Identifier = "GPL-3.0-only"
